services:
  - type: web
    name: orbit-track-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run db:deploy && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-track-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://orbit-track.vercel.app # Update with your real Vercel URL
      - key: VAPID_EMAIL
        value: admin@yourdomain.com
      # Note: VAPID_PUBLIC_KEY and VAPID_PRIVATE_KEY will be auto-generated by the app if missing, but for production you should generate them via `npx web-push generate-vapid-keys` and set them in the Render dashboard manually so they persist across restarts.

databases:
  - name: orbit-track-db
    databaseName: orbittrack
    user: orbitadmin
