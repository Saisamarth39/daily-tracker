version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: orbit-track-db
    restart: always
    environment:
      POSTGRES_USER: orbit_user
      POSTGRES_PASSWORD: orbit_secure_password
      POSTGRES_DB: orbit_track
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orbit-track-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: orbit-track-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://orbit_user:orbit_secure_password@db:5432/orbit_track?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=orbit-track-prod-secret-987654321
      - CLIENT_URL=http://localhost:3000
      - VAPID_EMAIL=mailto:admin@orbit-track.com
    depends_on:
      - db
      - redis

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: orbit-track-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
